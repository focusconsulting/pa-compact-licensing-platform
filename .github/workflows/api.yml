name: API CI

on:
  push:
    branches: [main]
    paths: [api/**]
  pull_request:
    paths: [api/**]

defaults:
  run:
    working-directory: api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check licensing_api tests

      - name: Ruff format check
        run: uv run ruff format --check licensing_api tests

      - name: Pyright
        run: uv run pyright licensing_api

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          until docker compose exec -T postgres pg_isready -U licensing -d licensing; do
            echo "Waiting for postgres..."; sleep 1
          done
          until docker compose exec -T redis redis-cli ping | grep -q PONG; do
            echo "Waiting for redis..."; sleep 1
          done

      - name: Run tests with coverage
        run: |
          uv run --env-file .env.example coverage run --branch --source=licensing_api -m pytest
          uv run coverage report
