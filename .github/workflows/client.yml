name: Client CI

on:
  push:
    branches: [main]
  pull_request:
    paths: [client/**]
  workflow_dispatch:

defaults:
  run:
    working-directory: client

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v6
      - name: Check changed paths
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -q "^client/"; then
            echo "client=true" >> $GITHUB_OUTPUT
          else
            echo "client=false" >> $GITHUB_OUTPUT
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: client
          files: client/coverage/lcov.info
          fail_ci_if_error: true

  deploy:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.client == 'true')
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch Cognito config from Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "dev-cognito-config" \
            --query SecretString --output text)
          echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$(echo "$SECRET" | jq -r .user_pool_id)" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_COGNITO_CLIENT_ID=$(echo "$SECRET" | jq -r .client_id)"       >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_COGNITO_REGION=$(echo "$SECRET" | jq -r .region)"             >> "$GITHUB_ENV"

      - name: Build
        working-directory: client
        run: pnpm build

      - name: Deploy to S3
        run: aws s3 sync client/out/ s3://${{ vars.CLIENT_S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
