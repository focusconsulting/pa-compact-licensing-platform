version: 2
updates:
  # JavaScript (client/)
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      npm-all:
        patterns: ["*"]

  # Python / uv (api/)
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      pip-all:
        patterns: ["*"]

  # Terraform providers — app component
  - package-ecosystem: terraform
    directory: /infrastructure/iac/components/app/terraform
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      terraform-app-all:
        patterns: ["*"]

  # Terraform providers — ecr component
  - package-ecosystem: terraform
    directory: /infrastructure/iac/components/ecr/terraform
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      terraform-ecr-all:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions-all:
        patterns: ["*"]
